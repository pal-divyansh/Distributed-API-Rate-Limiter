# nginx/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Nginx Load Balancer Configuration
#
# Role: Single entry point that distributes traffic across api1 and api2.
# Algorithm: Round-robin (default) — each request goes to the next server.
#
# HOW NGINX ENABLES HORIZONTAL SCALING:
# - Client sends request to :80 (one public IP)
# - Nginx forwards to api1:3000 or api2:3000 alternately
# - Both api instances talk to the same Redis → shared rate limit state
# - If api1 crashes, Nginx automatically routes to api2 (failover)
#
# Nginx also sets X-Forwarded-For so the API sees the real client IP,
# not Nginx's internal IP. This is critical for per-IP rate limiting.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
    use epoll;                      # Efficient I/O multiplexing on Linux
    multi_accept on;
}

http {
    # ── Upstream Pool ────────────────────────────────────────────────────────
    # Nginx load balances across these backends using round-robin.
    # max_fails/fail_timeout: temporarily remove a server if it fails.
    upstream api_backend {
        least_conn;                 # Route to the server with fewest active connections

        server api1:3000 max_fails=3 fail_timeout=30s;
        server api2:3000 max_fails=3 fail_timeout=30s;

        # Keep persistent connections to backends (reduces TCP overhead)
        keepalive 32;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - "$request" $status $body_bytes_sent '
                    '"$http_user_agent" upstream=$upstream_addr '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ── Security Headers ─────────────────────────────────────────────────────
    server_tokens off;              # Don't expose Nginx version

    # ── Server Block ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Proxy Settings ───────────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Connection "";           # Required for keepalive
        proxy_set_header Host $host;

        # Pass real client IP to the Node.js app
        # The app uses this for per-IP rate limiting
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # ── Routes ───────────────────────────────────────────────────────────
        location / {
            proxy_pass http://api_backend;

            # Show which backend handled the request (for debugging)
            add_header X-Served-By $upstream_addr always;
        }

        # Health check endpoint — bypass rate limiting entirely
        location /health {
            proxy_pass http://api_backend;
            access_log off;         # Don't spam logs with health checks
        }

        # ── Error Pages ──────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"success":false,"error":"Service Unavailable","message":"All backend servers are down"}';
            add_header Content-Type application/json;
        }
    }
}
